<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Elevate — Quản trị lớp học</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --bg:#ffffff; --bg-soft:#f4f5f7; --ink:#0a0a0a; --ink-soft:#5a5f6a;
    --border:#e7e8eb; --accent-gold:#d99a2b; --success:#1f8a54; --danger:#d1453b;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55;}
  h1,h2,h3{font-family:'Anton','Inter',sans-serif;font-weight:400;text-transform:uppercase;letter-spacing:0.5px;line-height:1.05;}
  a{color:inherit;}
  header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,0.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);}
  .nav{max-width:900px;margin:0 auto;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  .logo{display:flex;flex-direction:column;line-height:1;}
  .logo img{height:30px;width:auto;display:block;margin-bottom:5px;}
  .logo .sub{font-size:9px;letter-spacing:2px;color:var(--ink-soft);margin-top:2px;font-weight:600;}
  main{max-width:900px;margin:0 auto;padding:36px 20px 80px;}
  .btn{display:inline-block;padding:11px 22px;border-radius:999px;font-weight:700;font-size:12px;letter-spacing:0.4px;text-transform:uppercase;cursor:pointer;border:1px solid transparent;transition:transform .12s,opacity .12s;font-family:'Inter';}
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--ink);color:#fff;}
  .btn-primary:hover{opacity:0.85;}
  .btn-ghost{background:transparent;border-color:var(--border);color:var(--ink);}
  .btn-ghost:hover{border-color:var(--ink);}
  .btn-danger{background:transparent;border:1px solid var(--border);color:var(--danger);padding:7px 14px;font-size:11px;}
  .btn-danger:hover{border-color:var(--danger);}

  .login-card{max-width:380px;margin:60px auto;background:var(--bg-soft);border:1px solid var(--border);border-radius:16px;padding:32px;}
  .login-card h2{margin:0 0 6px;font-size:24px;}
  .login-card p{color:var(--ink-soft);font-size:13px;margin:0 0 20px;}
  .login-card input{width:100%;padding:12px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:16px;margin-bottom:14px;}
  .login-card input:focus{outline:none;border-color:var(--ink);}
  .login-card .btn{width:100%;text-align:center;}
  .err{color:var(--danger);font-size:13px;font-weight:600;margin:10px 0 0;display:none;}

  .toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:26px;}
  .toolbar .actions{display:flex;gap:8px;}
  .tabs{display:flex;gap:8px;}
  .tab{
    padding:11px 22px;border-radius:999px;border:1px solid var(--border);background:transparent;
    font-weight:700;font-size:12px;cursor:pointer;font-family:'Inter';
    text-transform:uppercase;letter-spacing:0.4px;color:var(--ink-soft);
  }
  .tab.active{background:var(--ink);color:#fff;border-color:var(--ink);}

  .chip{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap;}
  .chip.ok{background:#e7f5ee;color:var(--success);}
  .chip.warn{background:#fbf1df;color:#a8720f;}
  .chip.bad{background:#fbe9e7;color:var(--danger);}

  .member-form{
    background:var(--bg-soft);border:1px solid var(--border);border-radius:14px;
    padding:18px;margin:14px 0 24px;display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;
  }
  .member-form label{display:block;font-size:11px;font-weight:700;color:var(--ink-soft);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px;}
  .member-form input{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:16px;}
  .member-form input:focus{outline:none;border-color:var(--ink);}
  .member-form .form-actions{grid-column:1/-1;display:flex;gap:10px;}

  .summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:34px;}
  .sum-card{border:1px solid var(--border);border-radius:12px;padding:14px 16px;}
  .sum-card .cls{font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;}
  .sum-card .cnt{font-family:'Anton',sans-serif;font-size:24px;margin-top:4px;}
  .sum-card .cnt.full{color:var(--danger);}
  .sum-card .when{font-size:11px;color:var(--ink-soft);}

  .day-title{font-size:13px;text-transform:uppercase;letter-spacing:2px;font-weight:700;margin:28px 0 10px;display:flex;align-items:center;gap:10px;}
  .day-title::before{content:"";width:22px;height:2px;background:var(--accent-gold);display:inline-block;}
  .day-title .past-tag{font-size:10px;color:var(--ink-soft);letter-spacing:1px;border:1px solid var(--border);border-radius:6px;padding:2px 8px;}
  .past{opacity:0.55;}
  #bookingList,#memberList{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
  th{color:var(--ink-soft);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:1px;}
  td.contact a{color:var(--ink-soft);text-decoration:none;}
  td.contact a:hover{color:var(--ink);}
  .badge{display:inline-block;padding:3px 9px;border-radius:6px;background:var(--bg-soft);border:1px solid var(--border);color:var(--ink-soft);font-size:11px;font-weight:700;}
  .empty{color:var(--ink-soft);font-size:14px;padding:30px 0;text-align:center;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:13px 22px;border-radius:999px;font-weight:700;font-size:13px;display:none;z-index:200;}
  .toast.show{display:block;}
  @media(max-width:640px){
    th:nth-child(4),td:nth-child(4){display:none;}
    .members-table th:nth-child(3),.members-table td:nth-child(3){display:none;}
  }
</style>
</head>
<body>

<header>
  <div class="nav">
    <div class="logo">
      <img src="media/logo-dark.png" alt="Hybrid Training Da Nang">
      <div class="sub">QUẢN TRỊ LỚP HỌC</div>
    </div>
    <a href="index.html" style="font-size:13px;color:var(--ink-soft);font-weight:600;text-decoration:none;">← Trang đặt lớp</a>
  </div>
</header>

<main>
  <div class="login-card" id="loginCard" style="display:none;">
    <h2>Đăng nhập</h2>
    <p>Nhập mã PIN quản trị để xem danh sách đặt chỗ.</p>
    <input type="password" id="pinInput" placeholder="Mã PIN" autocomplete="current-password">
    <button class="btn btn-primary" id="loginBtn" onclick="login()">Vào trang quản trị</button>
    <div class="err" id="loginErr"></div>
  </div>

  <div id="adminView" style="display:none;">
    <div class="toolbar">
      <div class="tabs">
        <button class="tab active" id="tabBookings" onclick="showTab('bookings')">Lượt đặt chỗ</button>
        <button class="tab" id="tabMembers" onclick="showTab('members')">Gói tập</button>
      </div>
      <div class="actions">
        <button class="btn btn-ghost" onclick="refreshAll()">Làm mới</button>
        <button class="btn btn-ghost" onclick="logout()">Đăng xuất</button>
      </div>
    </div>

    <div id="bookingsView">
      <div class="summary" id="summary"></div>
      <div id="bookingList"></div>
    </div>

    <div id="membersView" style="display:none;">
      <button class="btn btn-primary" onclick="toggleMemberForm()">+ Thêm thành viên</button>
      <div class="member-form" id="memberForm" style="display:none;">
        <div><label for="mName">Tên *</label><input type="text" id="mName" placeholder="Nguyễn Văn A"></div>
        <div><label for="mContact">SĐT / Email</label><input type="text" id="mContact" placeholder="09xx xxx xxx"></div>
        <div><label for="mNote">Gói / Ghi chú</label><input type="text" id="mNote" placeholder="Tháng đầu 1.000.000đ"></div>
        <div><label for="mStart">Ngày bắt đầu</label><input type="date" id="mStart"></div>
        <div><label for="mExpire">Hết hạn</label><input type="date" id="mExpire"></div>
        <div class="form-actions">
          <button class="btn btn-primary" onclick="addMember()">Lưu thành viên</button>
          <button class="btn btn-ghost" onclick="toggleMemberForm()">Huỷ</button>
        </div>
      </div>
      <div class="summary" id="memberSummary" style="margin-top:20px;"></div>
      <div id="memberList"></div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = "https://cunslraiaduiudvttwqj.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_6-KqJOC83PUK-OFFgWtOUA_cN-mf4vf";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const CAPACITY = 8;
const CLASS_INFO = {
  mon1: {label:"Thứ 2 · 17:00", name:"Sức mạnh toàn thân"},
  mon2: {label:"Thứ 2 · 18:15", name:"Sức mạnh toàn thân"},
  wed1: {label:"Thứ 4 · 17:00", name:"Sức mạnh thân trên"},
  wed2: {label:"Thứ 4 · 18:15", name:"Sức mạnh thân trên"},
  fri1: {label:"Thứ 6 · 17:00", name:"Sức mạnh thân dưới"},
  fri2: {label:"Thứ 6 · 18:15", name:"Sức mạnh thân dưới"},
};

let rows = [];
let members = [];

function pin(){ return sessionStorage.getItem("elevate_admin_pin") || ""; }

function showTab(t){
  document.getElementById("bookingsView").style.display = t === "bookings" ? "block" : "none";
  document.getElementById("membersView").style.display = t === "members" ? "block" : "none";
  document.getElementById("tabBookings").classList.toggle("active", t === "bookings");
  document.getElementById("tabMembers").classList.toggle("active", t === "members");
}

function refreshAll(){ loadData(); loadMembers(); }

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

function showLogin(msg){
  document.getElementById("adminView").style.display = "none";
  document.getElementById("loginCard").style.display = "block";
  const err = document.getElementById("loginErr");
  if(msg){ err.textContent = msg; err.style.display = "block"; }
  else{ err.style.display = "none"; }
}

async function login(){
  const value = document.getElementById("pinInput").value.trim();
  if(!value){ showLogin("Nhập mã PIN trước đã."); return; }
  const btn = document.getElementById("loginBtn");
  btn.disabled = true; btn.textContent = "Đang kiểm tra…";
  sessionStorage.setItem("elevate_admin_pin", value);
  await loadData();
  btn.disabled = false; btn.textContent = "Vào trang quản trị";
}

function logout(){
  sessionStorage.removeItem("elevate_admin_pin");
  document.getElementById("pinInput").value = "";
  showLogin();
}

function todayVN(){
  // yyyy-mm-dd theo giờ Việt Nam, để so buổi đã qua/sắp tới
  return new Intl.DateTimeFormat("en-CA", {timeZone:"Asia/Ho_Chi_Minh"}).format(new Date());
}

function fmtDate(iso){
  const [y,m,d] = iso.split("-");
  return `${d}/${m}/${y}`;
}
function fmtTime(ts){
  return new Intl.DateTimeFormat("vi-VN", {timeZone:"Asia/Ho_Chi_Minh", day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit"}).format(new Date(ts));
}

async function loadData(){
  const { data, error } = await db.rpc("admin_list_bookings", { p_pin: pin() });
  if(error){
    if((error.message || "").includes("unauthorized")){
      sessionStorage.removeItem("elevate_admin_pin");
      showLogin("Mã PIN chưa đúng.");
    }else{
      showLogin("Không kết nối được máy chủ — thử lại sau.");
    }
    return;
  }
  rows = data || [];
  document.getElementById("loginCard").style.display = "none";
  document.getElementById("adminView").style.display = "block";
  render();
  loadMembers();
}

// ==== GÓI TẬP ====

function plusMonths(iso, n){
  const [y, m, d] = iso.split("-").map(Number);
  return new Date(Date.UTC(y, m - 1 + n, d)).toISOString().slice(0, 10);
}

function toggleMemberForm(){
  const f = document.getElementById("memberForm");
  const opening = f.style.display === "none";
  f.style.display = opening ? "grid" : "none";
  if(opening){
    document.getElementById("mName").value = "";
    document.getElementById("mContact").value = "";
    document.getElementById("mNote").value = "";
    document.getElementById("mStart").value = todayVN();
    document.getElementById("mExpire").value = plusMonths(todayVN(), 1);
    document.getElementById("mName").focus();
  }
}

async function loadMembers(){
  const { data, error } = await db.rpc("admin_list_members", { p_pin: pin() });
  if(error){
    if(!(error.message || "").includes("unauthorized")){
      document.getElementById("memberList").innerHTML =
        '<div class="empty">Phần Gói tập chưa được cài trên máy chủ — chạy file supabase-members.sql trong Supabase SQL Editor (xem README).</div>';
    }
    return;
  }
  members = data || [];
  renderMembersList();
}

function memberStatus(expiresOn){
  const days = Math.round((new Date(expiresOn) - new Date(todayVN())) / 86400000);
  if(days < 0)  return {cls:"bad",  label:"Hết hạn " + (-days) + " ngày", days};
  if(days === 0) return {cls:"warn", label:"Hết hạn hôm nay", days};
  if(days <= 7) return {cls:"warn", label:"Còn " + days + " ngày", days};
  return {cls:"ok", label:"Còn " + days + " ngày", days};
}

function renderMembersList(){
  const sum = document.getElementById("memberSummary");
  const list = document.getElementById("memberList");
  sum.innerHTML = "";
  list.innerHTML = "";

  if(!members.length){
    list.innerHTML = '<div class="empty">Chưa có thành viên nào — bấm "+ Thêm thành viên" khi có người đăng ký gói.</div>';
    return;
  }

  const counts = {ok:0, warn:0, bad:0};
  members.forEach(m => counts[memberStatus(m.expires_on).cls]++);
  sum.innerHTML = `
    <div class="sum-card"><div class="cls">Còn hạn</div><div class="cnt">${counts.ok}</div><div class="when">trên 7 ngày</div></div>
    <div class="sum-card"><div class="cls">Sắp hết hạn</div><div class="cnt" style="color:#a8720f;">${counts.warn}</div><div class="when">trong 7 ngày tới</div></div>
    <div class="sum-card"><div class="cls">Đã hết hạn</div><div class="cnt ${counts.bad ? "full" : ""}">${counts.bad}</div><div class="when">cần liên hệ gia hạn</div></div>`;

  const table = document.createElement("table");
  table.className = "members-table";
  table.innerHTML = `<thead><tr><th>Tên</th><th>Liên hệ</th><th>Gói / Ghi chú</th><th>Bắt đầu</th><th>Hết hạn</th><th></th></tr></thead>`;
  const tbody = document.createElement("tbody");
  members.forEach(m => {
    const st = memberStatus(m.expires_on);
    const contactLink = /^[0-9+ ]+$/.test(m.contact)
      ? `<a href="tel:${m.contact.replace(/ /g,"")}">${m.contact}</a>` : escapeHtml(m.contact);
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><b>${escapeHtml(m.name)}</b></td>
      <td class="contact">${contactLink}</td>
      <td style="color:var(--ink-soft);font-size:13px;">${escapeHtml(m.note)}</td>
      <td style="color:var(--ink-soft);font-size:12px;">${fmtDate(m.started_on)}</td>
      <td>${fmtDate(m.expires_on)}<br><span class="chip ${st.cls}">${st.label}</span></td>
      <td style="text-align:right;white-space:nowrap;">
        <button class="btn btn-ghost" style="padding:7px 14px;font-size:11px;">+1 tháng</button>
        <button class="btn btn-danger">Xoá</button>
      </td>`;
    tr.querySelector(".btn-ghost").onclick = () => extendMember(m);
    tr.querySelector(".btn-danger").onclick = () => removeMember(m);
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  list.appendChild(table);
}

async function addMember(){
  const name = document.getElementById("mName").value.trim();
  const contact = document.getElementById("mContact").value.trim();
  const note = document.getElementById("mNote").value.trim();
  const started = document.getElementById("mStart").value;
  const expires = document.getElementById("mExpire").value;
  if(!name){ showToast("Nhập tên thành viên"); return; }
  if(!started || !expires){ showToast("Chọn ngày bắt đầu và ngày hết hạn"); return; }
  const { data, error } = await db.rpc("admin_add_member", {
    p_pin: pin(), p_name: name, p_contact: contact, p_note: note,
    p_started_on: started, p_expires_on: expires,
  });
  if(error || !data.ok){ showToast("Không lưu được — thử lại"); return; }
  toggleMemberForm();
  showToast("Đã thêm " + name);
  await loadMembers();
}

async function extendMember(m){
  if(!confirm(`Gia hạn thêm 1 tháng cho "${m.name}"?`)) return;
  const { data, error } = await db.rpc("admin_extend_member", { p_pin: pin(), p_id: m.id, p_months: 1 });
  if(error || !data.ok){ showToast("Không gia hạn được — thử lại"); return; }
  showToast("Hạn mới: " + fmtDate(data.expires_on));
  await loadMembers();
}

async function removeMember(m){
  if(!confirm(`Xoá thành viên "${m.name}" khỏi danh sách gói tập?`)) return;
  const { data, error } = await db.rpc("admin_delete_member", { p_pin: pin(), p_id: m.id });
  if(error){ showToast("Không xoá được — thử lại"); return; }
  showToast(data && data.deleted ? "Đã xoá" : "Thành viên này đã bị xoá trước đó");
  await loadMembers();
}

function render(){
  const today = todayVN();

  // Tổng quan các buổi sắp tới
  const upcoming = rows.filter(r => r.class_date >= today);
  const byClass = {};
  upcoming.forEach(r => {
    const k = r.class_id + "|" + r.class_date;
    (byClass[k] = byClass[k] || []).push(r);
  });
  const sum = document.getElementById("summary");
  sum.innerHTML = "";
  Object.keys(byClass).sort().forEach(k => {
    const [cid, date] = k.split("|");
    const info = CLASS_INFO[cid] || {label:cid, name:""};
    const n = byClass[k].length;
    const card = document.createElement("div");
    card.className = "sum-card";
    card.innerHTML = `<div class="cls">${info.label}</div>
      <div class="cnt ${n >= CAPACITY ? "full" : ""}">${n}/${CAPACITY}</div>
      <div class="when">${info.name} · ${fmtDate(date)}</div>`;
    sum.appendChild(card);
  });
  if(!upcoming.length){
    sum.innerHTML = `<div class="empty" style="grid-column:1/-1;">Chưa có lượt đặt nào cho các buổi sắp tới.</div>`;
  }

  // Danh sách chi tiết theo ngày (mới → cũ)
  const list = document.getElementById("bookingList");
  list.innerHTML = "";
  const byDate = {};
  rows.forEach(r => (byDate[r.class_date] = byDate[r.class_date] || []).push(r));
  Object.keys(byDate).sort().reverse().forEach(date => {
    const isPast = date < today;
    const section = document.createElement("div");
    if(isPast) section.className = "past";
    const title = document.createElement("div");
    title.className = "day-title";
    title.innerHTML = `${fmtDate(date)} ${isPast ? '<span class="past-tag">đã qua</span>' : ""}`;
    section.appendChild(title);

    const table = document.createElement("table");
    table.innerHTML = `<thead><tr><th>Lớp</th><th>Tên</th><th>Liên hệ</th><th>Đặt lúc</th><th></th></tr></thead>`;
    const tbody = document.createElement("tbody");
    byDate[date]
      .sort((a,b) => (a.class_id + a.created_at).localeCompare(b.class_id + b.created_at))
      .forEach(r => {
        const info = CLASS_INFO[r.class_id] || {label:r.class_id};
        const tr = document.createElement("tr");
        const contactLink = /^[0-9+ ]+$/.test(r.contact)
          ? `<a href="tel:${r.contact.replace(/ /g,"")}">${r.contact}</a>` : r.contact;
        tr.innerHTML = `
          <td><span class="badge">${info.label}</span></td>
          <td><b>${escapeHtml(r.name)}</b></td>
          <td class="contact">${contactLink}</td>
          <td style="color:var(--ink-soft);font-size:12px;">${fmtTime(r.created_at)}</td>
          <td style="text-align:right;"><button class="btn btn-danger">Xoá</button></td>`;
        tr.querySelector(".btn-danger").onclick = () => removeBooking(r);
        tbody.appendChild(tr);
      });
    table.appendChild(tbody);
    section.appendChild(table);
    list.appendChild(section);
  });
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

async function removeBooking(r){
  const info = CLASS_INFO[r.class_id] || {label:r.class_id};
  if(!confirm(`Xoá lượt đặt của "${r.name}" (${info.label} · ${fmtDate(r.class_date)})?\nChỗ trống sẽ được trả lại cho lớp.`)) return;
  const { data, error } = await db.rpc("admin_delete_booking", { p_pin: pin(), p_id: r.id });
  if(error){ showToast("Không xoá được — thử lại"); return; }
  showToast(data && data.deleted ? "Đã xoá" : "Lượt đặt này đã bị xoá trước đó");
  await loadData();
}

document.getElementById("pinInput").addEventListener("keydown", e => {
  if(e.key === "Enter") login();
});

if(pin()) loadData(); else showLogin();
setInterval(() => { if(pin()) loadData(); }, 60000);
</script>

</body>
</html>
